version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    command:
      - "--api.dashboard=false"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=rag-network"
      - "--entrypoints.web.address=:80"      
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rag-network
    
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=false"

  kibana:
    image: opensearchproject/opensearch-dashboards:2.11.0
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - rag-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kibana.rule=Host(`kibana.rag.local`)"
      - "traefik.http.services.kibana.loadbalancer.server.port=5601"

  ollama:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_ORIGINS=http://rag.local,http://app:5000
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - rag-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ollama.rule=Host(`ollama.rag.local`)"
      - "traefik.http.services.ollama.loadbalancer.server.port=11434"
      - "traefik.http.middlewares.ollama-buffering.buffering.maxRequestBodyBytes=50000000"
      - "traefik.http.middlewares.ollama-buffering.maxResponseBodyBytes=50000000"
      - "traefik.http.routers.ollama.middlewares=ollama-buffering"

  localstack:
    image: localstack/localstack:4.12
    environment:
      - PERSISTENCE=1
      - SERVICES=s3
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - DATA_DIR=/var/lib/localstack/data
      - TMPDIR=/var/lib/localstack/tmp
    volumes:
      - ./localstack-data:/var/lib/localstack
      - ./localstack-init:/docker-entrypoint-initaws.d
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=false"

  app:
    build: .
    image: pyrodocker1/eyaziis-nlp-rag:1.0
    environment:
      - CORS_ORIGINS=*
      - CORS_METHODS=*
      - PYTHONPATH=/app
      - FLASK_APP=app.app
      - FLASK_ENV=development
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT:-9200}
      - OPENSEARCH_INDEX=${OPENSEARCH_INDEX:-rag_documents}
      - OLLAMA_HOST=${OLLAMA_HOST:-ollama}
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:7b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - TOP_K=${TOP_K:-5}
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://localstack:4566}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-rag-documents}
      - S3_RESULTS_PREFIX=${S3_RESULTS_PREFIX:-results/}
      - S3_UPLOADS_PREFIX=${S3_UPLOADS_PREFIX:-uploads/}
    volumes:
      - ./data:/data
      - ./app/templates:/app/templates
      - ./app/static:/app/static
    networks:
      - rag-network
    command: flask run --host=0.0.0.0 --port=5000 --debug
    depends_on:
      opensearch:
        condition: service_healthy
      ollama:
        condition: service_healthy
      localstack:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`rag.local`) || Host(`localhost`)"
      - "traefik.http.services.app.loadbalancer.server.port=5000"
      - "traefik.http.routers.app-api.rule=Host(`api.rag.local`) && PathPrefix(`/api`)"
      - "traefik.http.routers.app-api.service=app"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowmethods=GET,PUT,POST,DELETE,OPTIONS"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.routers.app.middlewares=cors"
      - "traefik.http.routers.app-api.middlewares=cors"
      - "traefik.http.middlewares.rate-limit.ratelimit.average=100"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=50"
      - "traefik.http.routers.app-api.middlewares=rate-limit"

volumes:
  opensearch-data:
  ollama-models:

networks:
  rag-network:
    driver: bridge